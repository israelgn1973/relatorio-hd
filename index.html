      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 8 }}>
        {['1','2','3','4','5','6','7','8','9', pad.allowComma ? ',' : '', '0', 'back'].map((k, i) => k === '' ? <span key={i} /> : (
          <button key={i} onClick={() => press(k)}
            onPointerDown={() => setKeyDown(i)} onPointerUp={() => setKeyDown(null)} onPointerLeave={() => setKeyDown(null)} onPointerCancel={() => setKeyDown(null)}
            style={{ padding: '12px 0', fontSize: 20, fontWeight: 600, border: '1px solid #eee', borderRadius: 10, cursor: 'pointer', userSelect: 'none', touchAction: 'manipulation', transition: 'transform .05s, background .05s, box-shadow .05s',
              ...(keyDown === i
                ? { background: '#dce6f0', transform: 'scale(0.94)', boxShadow: 'inset 0 2px 5px rgba(0,0,0,0.18)' }
                : { background: '#fafbfc', boxShadow: '0 1px 2px rgba(0,0,0,0.04)' }) }}>
            {k === 'back' ? '⌫' : k}
          </button>
        ))}
      </div>
      <div style={{ display: 'flex', gap: 8, marginTop: 10 }}>
        <button onClick={() => onChange('')} style={{ flex: 1, padding: 12, borderRadius: 10, border: '1px solid #e0c0bc', background: '#fdf4f3', color: '#c0392b', fontWeight: 700, fontSize: 15, cursor: 'pointer' }}>C limpar</button>
        <button onClick={ok} style={{ flex: 2, padding: 12, borderRadius: 10, border: 'none', background: '#1a3a5c', color: 'white', fontWeight: 700, fontSize: 16, cursor: 'pointer' }}>OK</button>
      </div>
    </div>
  );
}

function ChipSelect({ label, options, value, onSelect, color = '#1a3a5c', herdado = false }) {
  return (

        {label}

      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
        {value && !options.includes(value) && (
          <span style={{ ...S.checkItem, fontSize: 12, background: color, color: 'white', borderColor: color }}>{value}</span>

        {options.map(o => (
          <span key={o} style={{ ...S.checkItem, fontSize: 12, ...(value === o ? { background: color, color: 'white', borderColor: color } : {}) }}

        ))}

}

function NefroApp() {
  const [view, setView] = useState('lista');

  // chaveNoite: identifica a "noite" atual (após meia-noite ainda é a noite que começou ontem)
  const chaveNoite = () => { const d = new Date(); if (d.getHours() < 6) d.setDate(d.getDate() - 1); return d.toISOString().slice(0, 10); };
  const [noturno, setNoturno] = useState(() => {

      if (veto && veto.noite === chaveNoite()) return veto.estado;
    } catch {}
    const h = new Date().getHours(); return h >= 21 || h < 6;
  });
  React.useEffect(() => { try { document.documentElement.classList.toggle('noturno', noturno); } catch {} }, [noturno]);
  React.useEffect(() => {
    const tick = () => {
      let vetoAtivo = false;
      try { const v = JSON.parse(localStorage.getItem('nefro_noturno_veto') || 'null'); vetoAtivo = v && v.noite === chaveNoite(); } catch {}
      if (!vetoAtivo) setNoturno(ehNoite());

  const alternarNoturno = () => {

  const [pacientes, setPacientes] = useState(() => carregarDados().pacientes);
  const [avaliacoes, setAvaliacoes] = useState(() => carregarDados().avaliacoes);
  const [lixeira, setLixeira] = useState(() => carregarDados().lixeira || []);
  useEffect(() => { salvarDados(pacientes, avaliacoes, lixeira); }, [pacientes, avaliacoes, lixeira]);
  const [pacAtual, setPacAtual] = useState(null);
  const [dxPaineis, setDxPaineis] = useState({});
  const [docsArquivados, setDocsArquivados] = useState(() => { try { return JSON.parse(localStorage.getItem('nefro_docsArq') || '[]'); } catch { return []; } });
  const [docVisto, setDocVisto] = useState(null);
  const [intercAtivo, setIntercAtivo] = useState(null);
  useEffect(() => { try { localStorage.setItem('nefro_docsArq', JSON.stringify(docsArquivados)); } catch {} }, [docsArquivados]);
  useEffect(() => {
    if (!pacAtual) return;
    const cm = pacAtual.comorbidades || [];
    if ((cm.includes('Angioplastia prévia/tardia') || cm.includes('RM prévia (PO tardio)')) && !cm.includes('DAC')) {
      const at = { ...pacAtual, comorbidades: [...cm, 'DAC'], updatedAt: Date.now() };
      setPacientes(ps => ps.map(p => p.id === pacAtual.id ? at : p));
      setPacAtual(at);
    }
  }, [pacAtual?.comorbidades]);
  // Histórico real de sessões de HD (fonte: relatórios de enfermagem + ultima_hd_data). Base das Fases 1-3.
  const histSessoesHD = (p) => {
    if (!p) return [];
    const datas = new Set();
    (p.relEnf || []).forEach(r => { const d = r.campos?.data; if (d && /^\d{2}\/\d{2}\/\d{4}$/.test(d)) datas.add(d.split('/').reverse().join('-')); });
    (avaliacoes[p.id] || []).forEach(a => { if (a.ultima_hd_data) datas.add(a.ultima_hd_data); if (a.hd_destino === 'realizada' && a.conduta && String(a.conduta).startsWith('hd')) datas.add(dataLocalISO(a.data)); });
    return [...datas].filter(Boolean).sort();
  };
  // Início do episódio de desmame contínuo: caminha o histórico (mais recente → antigo) e devolve o hd_desmame_desde mais ANTIGO do episódio atual (para no primeiro dia em que a conduta foi HD). Evita que a data resete para hoje.
  const desmameDesde = (pid, excludeId) => {
    const lst = (avaliacoes[pid] || []).filter(a => a.id !== excludeId).sort((a, b) => (b.data || 0) - (a.data || 0));
    let found = '';
    for (const a of lst) {
      if (a.conduta && String(a.conduta).indexOf('hd') === 0) break;
      if (a.hd_desmame_desde) found = a.hd_desmame_desde;
    }
    return found || dataLocalISO(Date.now());
  };
  const [avAtual, setAvAtual] = useState(null);
  const [tab, setTab] = useState('info');
  const [showModal, setShowModal] = useState(false);
  const [editandoPacId, setEditandoPacId] = useState(null);
  const [novoPac, setNovoPac] = useState(novoPacVazio());
  const [copiado, setCopiado] = useState(false);
  const [previaTxt, setPrevia] = useState(null);
  const [numpad, setNumpad] = useState(null);
  const [pdfHtml, setPdfHtml] = useState(null);
  const [filtroHD, setFiltroHD] = useState(false);
  const [soPendentes, setSoPendentes] = useState(false);
  const [filtroUti, setFiltroUti] = useState('');
  const [buscaNome, setBuscaNome] = useState('');
  const [utiPicker, setUtiPicker] = useState(false);
  const [ufPicker, setUfPicker] = useState(false);
  const [verArquivados, setVerArquivados] = useState(false);
  const [buscaInativo, setBuscaInativo] = useState('');
  const [forcar, setForcar] = useState(0);
  const [verMeusDx, setVerMeusDx] = useState(false);
  const [verParecer, setVerParecer] = useState(false);
  const [verEletro, setVerEletro] = useState(true);
  const [verDisna, setVerDisna] = useState(false);
  const [verMedRev, setVerMedRev] = useState(false);
  const [verDados, setVerDados] = useState(false);
  const [encaminhaSel, setEncaminhaSel] = useState(false);
  const [verDiasSemHD, setVerDiasSemHD] = useState(false);
  const [verLinks, setVerLinks] = useState(false);
  const [verPlantao, setVerPlantao] = useState(false);
  const [verSorologia, setVerSorologia] = useState(false);
  const [diasHDsoAtiva, setDiasHDsoAtiva] = useState(true);
  const [verLixeira, setVerLixeira] = useState(false);
  const [mesStats, setMesStats] = useState(null);
  const [modoExcluir, setModoExcluir] = useState(false);
  const [modalComExcluir, setModalComExcluir] = useState(false);
  const [avSnapshot, setAvSnapshot] = useState(null);
  const [relEnf, setRelEnf] = useState(null);
  const [caixaRel, setCaixaRel] = useState(null);
  const [coletivoHtml, setColetivoHtml] = useState(null);
  const [diaPep, setDiaPep] = useState(null);
  const [toast, setToast] = useState(null);
  const toastRef = React.useRef(null);
  const mostrarToast = (msg) => {
    setToast(msg);
    if (toastRef.current) clearTimeout(toastRef.current);
    toastRef.current = setTimeout(() => setToast(null), 1600);
  };
  // EXPORTAÇÕES DE PRESCRIÇÃO (denominador do "falta alguém?")
  const dataDaAv = (avData) => dataLocalISO(avData);
  const registrarExportacao = (pacId, avData) => {
    const dISO = dataDaAv(avData);
    setPacientes(ps => ps.map(p => {
      if (p.id !== pacId) return p;
      const exps = p.prescExportadas || [];
      // 1 por paciente+data (vale a última): se já há nesse dia, atualiza o timestamp; senão, adiciona
      const semEsteDia = exps.filter(e => e.data !== dISO);
      return { ...p, prescExportadas: [...semEsteDia, { data: dISO, em: Date.now() }] };
    }));
  };
  // "FALTA ALGUÉM?" — compara prescrições exportadas vs relatórios recebidos, por data
  const faltamRelatorios = (dataISO) => {
    // pacientes que tiveram prescrição EXPORTADA naquela data
    const exportados = pacientes.filter(p => (p.prescExportadas || []).some(e => e.data === dataISO));
    // dos exportados, quais NÃO têm relatório recebido com a data da sessão correspondente
    const dataBR = dataISO.split('-').reverse().join('/');
    const faltam = exportados.filter(p => !(p.relEnf || []).some(r => (r.campos?.data || '') === dataBR));
    return { total: exportados.length, recebidos: exportados.length - faltam.length, faltam };
  };
  const ontemISO = () => { const d = new Date(Date.now() - 86400000); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); };
  // CONTADOR DE RELATÓRIOS (registro por data + travas de duplicidade)
  const normRaw = (s) => (s || '').replace(/\s+/g, ' ').trim().toLowerCase();
  // todos os relatórios recebidos (de todos os pacientes), com paciente e data da sessão
  const relRecebidos = () => {
    const out = [];
    pacientes.forEach(p => (p.relEnf || []).forEach(r => {
      out.push({ pacId: p.id, pacNome: p.nome, dataSessao: r.campos?.data || '', raw: r.raw || '', criadoEm: r.criadoEm || 0 });
    }));
    return out;
  };
  // recebidos após a última zeragem (o que o contador mostra)
  const relRecebidosCiclo = () => relRecebidos().filter(r => r.criadoEm >= relZeradoEm).sort((a, b) => b.criadoEm - a.criadoEm);
  // TRAVAS: classifica um novo relatório colado. retorna {tipo, relAntigo, pacId}
  //  tipo: 'identico' (barra), 'correcao' (mesmo pac+data, texto difere → pergunta), 'novo' (aceita)
  const classificarRel = (raw, pacId, dataSessao) => {
    const nr = normRaw(raw);
    // 1) idêntico a um relatório já guardado
    for (const p of pacientes) for (const r of (p.relEnf || [])) {
      if (normRaw(r.raw) === nr && nr.length > 0) {
        // se o idêntico é do CICLO ATUAL (após o último zeramento) → duplicata real, barra
        if ((r.criadoEm || 0) >= relZeradoEm) return { tipo: 'identico', pacId: p.id };
        // se é de um ciclo ANTERIOR (antes de zerar) → revive para o ciclo atual
        return { tipo: 'reviver', pacId: p.id, relAntigo: r };
      }
    }
    // 2) mesmo paciente + mesma data da sessão, texto difere → possível correção
    if (pacId && dataSessao) {
      const p = pacientes.find(x => x.id === pacId);
      const antigo = (p?.relEnf || []).find(r => (r.campos?.data || '') === dataSessao);
      if (antigo) return { tipo: 'correcao', relAntigo: antigo, pacId };
    }
    // 3) novo
    return { tipo: 'novo', pacId };
  };
  // Casa relatório órfão (data sem prescrição de HD) com a prescrição de HD mais recente SEM relatório (pendente),
  // re-datando o relatório para a data dessa prescrição. Vários órfãos preenchem pendentes distintas (mais recente primeiro).
  const reconciliarOrfaos = (pacId, listaCampos) => {
    const pac = pacientes.find(p => p.id === pacId);
    if (!pac) return listaCampos;
    const toISO = s => (!s || s.length < 10) ? '' : (s.slice(6, 10) + '-' + s.slice(3, 5) + '-' + s.slice(0, 2));
    const avsP = avaliacoes[pacId] || [];
    const prescs = avsP.filter(a => a.conduta === 'hd_hoje' && !a.hd_cancelada).sort((a, b) => b.data - a.data);
    if (!prescs.length) return listaCampos;
    const datasPresc = new Set(prescs.map(a => dataLocalISO(a.data)));
    const datasComRel = new Set((pac.relEnf || []).map(r => toISO(r.campos?.data)).filter(Boolean));
    const pendentes = prescs.map(a => dataLocalISO(a.data)).filter(iso => !datasComRel.has(iso));
    const usados = new Set();
    listaCampos.forEach(c => { const iso = toISO(c.data); if (iso && datasPresc.has(iso)) usados.add(iso); });
    return listaCampos.map(c => {
      const iso = toISO(c.data);
      if (!iso || datasPresc.has(iso)) return c; // sem data válida OU já casa prescrição → mantém
      const alvo = pendentes.find(d => !usados.has(d)); // pendente mais recente ainda livre
      if (!alvo) return c; // nenhuma pendente → mantém data original
      usados.add(alvo);
      return { ...c, data: alvo.slice(8, 10) + '/' + alvo.slice(5, 7) + '/' + alvo.slice(0, 4) };
    });
  };
  // LEVA 2: aplica o relatório direto no paciente (sem trava campo-a-campo)
  const aplicarRelUnico = (c, raw, pacId, jaConfirmado) => {
    // DATA VIRADA: relatório com data de amanhã pode ser HD que virou a meia-noite
    if (!jaConfirmado && c.data) {
      const [dd, mm, aa] = c.data.split('/').map(Number);
      const dt = new Date(aa, mm - 1, dd, 12);
      const dif = Math.round((dt - new Date(new Date().getFullYear(), new Date().getMonth(), new Date().getDate(), 12)) / 86400000);
      if (dif === 1) {
        const ontem = new Date(dt.getTime() - 86400000);
        const dataOntem = String(ontem.getDate()).padStart(2,'0') + '/' + String(ontem.getMonth()+1).padStart(2,'0') + '/' + ontem.getFullYear();
        const ok = confirm('Este relatório tem data de ' + c.data + ' (amanhã).\n\nA HD virou a meia-noite ou foi feita no dia seguinte por logística, mas pertence ao ciclo de ' + dataOntem + '?\n\nOK = receber no ciclo de ' + dataOntem + '\nCancelar = não aplicar');
        if (!ok) { mostrarToast('Não aplicado'); return; }
        c = { ...c, data: dataOntem }; // associa ao ciclo de ontem
      }
    }
    // TRAVAS de duplicidade
    if (!jaConfirmado) {
      const cls = classificarRel(raw, pacId, c.data || '');
      if (cls.tipo === 'reviver') {
        // relatório idêntico de um ciclo anterior (antes do zeramento): traz para o ciclo atual
        // atualiza data/campos com os do relatório reenviado (pode ter data diferente do registro antigo)
        const idAntigo = cls.relAntigo?.id;
        setPacientes(ps => ps.map(p => p.id === cls.pacId ? { ...p, relEnf: (p.relEnf || []).map(r => r.id === idAntigo ? { ...r, campos: c, raw, criadoEm: Date.now() } : r) } : p));
        const prev = pacientes.find(p => p.id === cls.pacId);
        mostrarToast('✓ Relatório reativado no ciclo atual' + (prev ? ' (' + prev.nome + ')' : ''));
        return;
      }
      if (cls.tipo === 'identico') {
        const pdup = pacientes.find(p => p.id === cls.pacId);
        mostrarToast('⛔ Relatório idêntico já recebido neste ciclo' + (pdup ? ' (' + pdup.nome + ')' : ''));
        return;
      }
      if (cls.tipo === 'correcao') {
        const okCorr = confirm('Já existe um relatório deste paciente nesta data (' + (c.data || '') + '), com texto diferente.\n\nÉ uma CORREÇÃO do anterior?\n\nOK = substituir o anterior\nCancelar = não aplicar (verifique se a data está certa)');
        if (!okCorr) { mostrarToast('Não aplicado — verifique a data'); return; }
        // remover o relatório antigo daquele paciente/data antes de aplicar o corrigido
        setPacientes(ps => ps.map(p => p.id === pacId ? { ...p, relEnf: (p.relEnf || []).filter(r => (r.campos?.data || '') !== (c.data || '')) } : p));
      }
    }
    // casa relatório órfão com prescrição de HD pendente (re-data) — silencioso, sem confirmação
    const _dataOrig = c.data;
    c = reconciliarOrfaos(pacId, [c])[0];
    const _redatado = !!c.data && c.data !== _dataOrig;
    const pac = pacientes.find(p => p.id === pacId);
    let divergencia = null, presc = null;
    if (pac) {
      const avsP = avaliacoes[pac.id] || [];
      const dataISO = c.data ? c.data.split('/').reverse().join('-') : null;
      presc = avsP.find(a => a.conduta === 'hd_hoje' && (!dataISO || dataLocalISO(a.data) === dataISO)) || avsP.find(a => a.conduta === 'hd_hoje');
      if (presc) {
        const ufPresc = (parseFloat(presc.uf_hd) || 0) + (parseFloat(presc.uf_isolada) || 0);
        const ufObt = parseFloat(c.ufEfetiva);
        const tPresc = durHoras(presc.hd_dur || presc.hd_horas);
        const tObt = durHoras(c.durCalc || c.tempo);
        const difs = [];
        if (ufPresc && !isNaN(ufObt) && ufObt < ufPresc - 100) difs.push(`UF ${ufObt}<${ufPresc}`);
        if (tPresc && tObt && tObt < tPresc - 0.2) difs.push(`tempo ${c.durCalc || c.tempo}<${presc.hd_dur || presc.hd_horas}`);
        if (difs.length) divergencia = difs.join(' · ');
      }
    }
    const novoRel = { id: 'rel_' + Date.now() + '_' + Math.random().toString(36).slice(2,6), criadoEm: Date.now(), campos: c, raw: raw, usadoEm: null, divergencia: divergencia || null };
    const rawL = (raw || '').toLowerCase();
    const acessoDet = /\bfav\b|f\.a\.v/.test(rawL) ? 'FAV' : /\bcdl\b|cateter|cat\u00e9ter|permcath|shilley|duplo l[u\u00fa]men/.test(rawL) ? 'CDL' : null;
    if (acessoDet && presc && presc.acesso !== acessoDet) {
      setAvaliacoes(prev => ({ ...prev, [pacId]: (prev[pacId] || []).map(a => a.id === presc.id ? { ...a, acesso: acessoDet } : a) }));
    }
    setPacientes(ps => ps.map(p => { if (p.id !== pacId) return p; const _dn = !p.nascimento ? extrairNascimento(raw) : ''; const _ex = _dn ? { nascimento: _dn, ...(p.idade ? {} : { idade: calcIdade(_dn) || '' }) } : {}; return { ...p, ..._ex, relEnf: [novoRel, ...(p.relEnf || [])].slice(0, 10), updatedAt: Date.now() }; }));
    // alertas NÃO-TRAVANTES (toast)
    const avisos = [];
    if (divergencia) avisos.push('Divergência: ' + divergencia);
    if (pac && c.nome && nrmNome(pac.nome) !== nrmNome(c.nome) && nomeSemelhante(pac.nome, c.nome) >= 0.6) avisos.push('Nome difere do cadastro — confira');
    if (acessoDet && presc && presc.acesso !== acessoDet) avisos.push('Acesso: ' + acessoDet);
    if (_redatado) avisos.push('data ' + _dataOrig + ' → ' + c.data + ' (prescrição pendente)');
    mostrarToast('✓ Relatório aplicado' + (avisos.length ? ' ⚠ ' + avisos.join(' | ') : ' a ' + (pac?.nome || '')));
  };
  const [modoConsulta, setModoConsulta] = useState(false);
  // Fase 1a — "1ª sessão" é derivada: se há sessão realizada ANTES de hoje, não é 1ª sessão (limpa flag obsoleta).
  useEffect(() => {
    if (!pacAtual || !avAtual?.hd_primeira_sessao || modoConsulta) return;
    const hoje = dataLocalISO();
    if (histSessoesHD(pacAtual).some(iso => iso && iso < hoje)) setAvAtual(a => a ? { ...a, hd_primeira_sessao: false } : a);
  }, [avAtual?.id, avAtual?.hd_primeira_sessao, pacAtual?.relEnf]);
  // Pré-preenche os chips de "Intercorrências da sessão" com o que veio no relatório de enfermagem.
  // Só preenche se ainda estiver vazio, uma única vez por relatório (relIntercSync); o médico desmarca falso positivo.
  useEffect(() => {
    if (modoConsulta || !pacAtual || !avAtual) return;
    if (dataLocalISO(avAtual.data) !== dataLocalISO()) return;
    const reps = (pacAtual.relEnf || []).filter(r => r && r.campos && r.campos.data);
    if (!reps.length) return;
    const keyd = d => (d || '').split('/').reverse().join('');
    const rep = reps.reduce((a, b) => keyd(b.campos.data) >= keyd(a.campos.data) ? b : a);
    if (avAtual.relIntercSync === rep.id) return;
    const ev = mapRelParaRegistro(rep.campos, rep.divergencia).interc.filter(x => x !== 'Nenhuma');
    const cur = (Array.isArray(avAtual.interc) ? avAtual.interc : []).filter(x => x !== 'Nenhuma');
    if (cur.length || !ev.length) { setAvAtual(a => a ? { ...a, relIntercSync: rep.id } : a); return; }
    setAvAtual(a => a ? { ...a, interc: ev, relIntercSync: rep.id } : a);

          out.diureticos = dl;
          out.diur_doses = doses;
          return out;
        })(),

    if (avSnapshot) setAvSnapshot(JSON.stringify(av2));

    // Auto-esquema (referência): prescrição de HD de hoje, paciente em 3×/sem, num dia FORA do esquema → troca provisória para o 3×/sem do dia. Revertida se o relatório não chegar.
    if (avAtual.conduta === 'hd_hoje' && (pacAtual.esquemaHD === 'sqs' || pacAtual.esquemaHD === 'tqs')) {

            setPacientes(ps => ps.map(p => p.id === pacAtual.id ? { ...p, ...patch, updatedAt: Date.now() } : p));

    const blob = new Blob([JSON.stringify({ pacientes, avaliacoes, lixeira, exportadoEm: new Date().toISOString() }, null, 2)], { type: 'application/json' });
    const file = new File([blob], nome, { type: 'application/json' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      navigator.share({ files: [file], title: nome }).catch(() => {});
    } else {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = nome;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

  function importarDados(file) {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const d = JSON.parse(e.target.result);
        if (!d.pacientes) { alert('Arquivo inválido.'); return; }
        const qtd = d.pacientes.length;
        if (confirm(`Importar ${qtd} paciente(s) mesclando com os atuais? Pacientes existentes são mantidos; em coincidências vale o registro mais recente.`)) {
          // vencedor por paciente: o lado com updatedAt mais recente
          const recencia = p => p.updatedAt || 0;
          const novosVence = {};
          const mapaPac = {};
          pacientes.forEach(p => { mapaPac[p.id] = p; });
          d.pacientes.forEach(p => {
            if (!mapaPac[p.id] || recencia(p) >= recencia(mapaPac[p.id])) { mapaPac[p.id] = p; novosVence[p.id] = true; }
          });
          const pacMerged = Object.values(mapaPac);

          const avMerged = { ...avaliacoes };
          const dia = a => { try { return dataLocalISO(a.data); } catch { return String(a.data); } };
          Object.entries(d.avaliacoes || {}).forEach(([pid, avsImp]) => {
            const atuais = avMerged[pid] || [];
            const porDia = {};
            atuais.forEach(a => { porDia[dia(a)] = a; });
            (avsImp || []).forEach(a => {
              const k = dia(a);
              if (!porDia[k] || novosVence[pid]) porDia[k] = a; // coincidência de dia: vale o lado do paciente mais recente
            });
            avMerged[pid] = Object.values(porDia).sort((x, y) => new Date(y.data) - new Date(x.data));
          });

          setPacientes(pacMerged);
          setAvaliacoes(avMerged);
          const lixMap = {};
          lixeira.forEach(p => { lixMap[p.id] = p; });
          (d.lixeira || []).forEach(p => { if (!lixMap[p.id]) lixMap[p.id] = p; });
          const pacIds = new Set(pacMerged.map(p => p.id));
          setLixeira(Object.values(lixMap).filter(p => !pacIds.has(p.id)));
          const homs = [];
          pacMerged.forEach((p, i) => pacMerged.slice(i + 1).forEach(q => {
            if (nrmNome(p.nome) === nrmNome(q.nome) && String(p.idade || '') === String(q.idade || '')) homs.push(p.nome);
          }));
          alert(`Importação concluída: ${pacMerged.length} paciente(s) no app.` + (homs.length ? `\n\nAtenção — possíveis duplicados (homônimos com mesma idade): ${[...new Set(homs)].join(', ')}. Estão marcados na lista; arraste para a esquerda o registro que não quer manter e exclua.` : ''));
        }
      } catch (err) { alert('Erro ao ler o arquivo.'); }
    };
    reader.readAsText(file);
  }

                </>);
              })()}
              <Item k="Conclusão" v={{ acompanhamento: 'Segue em acompanhamento', alta_nefro: 'Alta da nefrologia', alta_hosp: 'Alta hospitalar', paliativo: 'Cuidados paliativos', obito: 'Óbito' }[avV.conclusao]} />
            </div>
          </div>
        </div>

        <div style={S.bottomActions}>
          <button style={{ ...S.btn, background: '#f0f0f0', flex: '0 0 auto', padding: '12px 14px' }} onClick={() => setView('roteiro')}>‹</button>
          <button style={{ ...S.btn, background: copiado ? '#1a3a5c' : '#27ae60', color: 'white' }} onClick={copiarPanorama}>
            {copiado ? '✓ Copiado' : '📋 Copiar p/ prontuário'}
          </button>
          {avV.conduta?.startsWith('hd') && (
            <button style={{ ...S.btn, background: '#c0392b', color: 'white' }} onClick={() => { setOrigemPresc('panorama'); setView('prescricao'); }}>Prescrição</button>
          )}
        </div>

        <RodapeNav salvarSair={(!_folheando && !modoConsulta) ? (() => concluirOuAuditar('conduta')) : null} direita="◂ Última tela" onDireita={() => { setDiaFolheado(0); setModoConsulta(false); const o = origemResumo || { v: 'roteiro', sub: 'estado' }; setSubRot(o.sub === 'beira' ? 'estado' : (o.sub || 'estado')); setView(o.v || 'roteiro'); }} />
      </div>
    );
  }

  return <div style={{ padding: 40, textAlign: 'center', color: '#888' }}>Carregando...</div>;
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<NefroApp />);
</script>
</body>
</html>
